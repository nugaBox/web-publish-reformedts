<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="../">
  <title>미디어 글쓰기 — 개혁신학연구회</title>
  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/pretendard.css">
  <link rel="stylesheet" href="assets/css/fontawesome.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/sub.css">
</head>
<body>

  <div data-include="include/header.html"></div>

  <main id="main-content">

    <header class="page-hero">
      <img src="assets/images/main_reformedts.jpg" alt="개혁신학연구회" class="hero-bg-img">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <!-- CMS: 게시판명 출력 -->
        <h1 class="hero-title">글쓰기</h1>
        <div class="breadcrumb-custom">
          <span>Home</span>
          <i class="fa-solid fa-chevron-right" style="font-size:0.6rem;"></i>
          <span class="active-item">연구회 소식</span>
          <i class="fa-solid fa-chevron-right" style="font-size:0.6rem;"></i>
          <span>앨범</span>
          <i class="fa-solid fa-chevron-right" style="font-size:0.6rem;"></i>
          <span>글쓰기</span>
        </div>
      </div>
    </header>

    <div class="container py-5 my-lg-4">
      <div class="row g-5">

        <aside class="col-lg-3 d-none d-lg-block">
          <div class="sticky-top" style="top:100px; z-index:10;">
            <div class="sidebar-heading">
              <h2>News</h2>
              <small class="text-muted">연구회 소식</small>
            </div>
            <div class="list-group sidebar-nav">
              <a class="list-group-item" href="board/notice-list.html">
                <span>공지사항</span><i class="fa-solid fa-chevron-right"></i>
              </a>
              <a class="list-group-item" href="board/press-list.html">
                <span>언론보도</span><i class="fa-solid fa-chevron-right"></i>
              </a>
              <a class="list-group-item" href="board/member-news-list.html">
                <span>회원동정</span><i class="fa-solid fa-chevron-right"></i>
              </a>
              <a class="list-group-item active" href="board/album-list.html">
                <span>앨범</span><i class="fa-solid fa-chevron-right"></i>
              </a>
            </div>
          </div>
        </aside>

        <section class="col-lg-9">

          <div class="content-title-area">
            <h3>글쓰기</h3>
          </div>

          <form action="#" method="post" enctype="multipart/form-data">

            <table class="write-form-table mb-4">
              <tbody>

                <!-- 제목 -->
                <tr>
                  <th>제목 <span class="text-danger">*</span></th>
                  <td>
                    <input type="text" class="form-control" placeholder="제목을 입력해 주세요." required>
                  </td>
                </tr>

                <!-- 작성자 -->
                <tr>
                  <th>작성자</th>
                  <td>
                    <input type="text" class="form-control" value="관리자" style="max-width:200px;" readonly>
                  </td>
                </tr>

                <!-- 대표 썸네일 -->
                <tr>
                  <th style="vertical-align:top; padding-top:1rem;">
                    대표 이미지 <span class="text-danger">*</span>
                    <div class="small fw-normal text-muted mt-1">목록 썸네일용</div>
                  </th>
                  <td>
                    <div class="thumb-upload-preview mb-2"
                         onclick="document.getElementById('thumb-input').click()"
                         style="max-width:320px;">
                      <i class="fa-solid fa-cloud-arrow-up fs-2" style="color:var(--secondary-gold);"></i>
                      <p class="small text-muted mt-2 mb-0">클릭하여 대표 이미지 업로드</p>
                      <p class="small text-muted">권장 비율 16:9 / JPG·PNG (최대 5MB)</p>
                    </div>
                    <input type="file" id="thumb-input" name="thumbnail" accept="image/*" class="d-none">
                  </td>
                </tr>

                <!-- 설명 (본문) -->
                <tr>
                  <th style="vertical-align:top; padding-top:1rem;">설명</th>
                  <td>
                    <textarea class="content-editor-area" name="content"
                      style="min-height:160px;"
                      placeholder="사진에 대한 설명이나 행사 내용을 입력해 주세요."></textarea>
                  </td>
                </tr>

                <!-- 다중 이미지/파일 업로드 -->
                <tr>
                  <th style="vertical-align:top; padding-top:1rem;">
                    사진 업로드
                    <div class="small fw-normal text-muted mt-1">최대 50장</div>
                  </th>
                  <td>
                    <div class="file-upload-area mb-2"
                         onclick="document.getElementById('media-input').click()">
                      <i class="fa-solid fa-images"></i>
                      <p class="mt-2 mb-1">클릭하거나 드래그하여 사진을 여러 장 업로드</p>
                      <p class="small text-muted">JPG, PNG, GIF (장당 최대 10MB / 총 50장)</p>
                    </div>
                    <input type="file" id="media-input" name="images" multiple
                           accept="image/jpeg,image/png,image/gif,image/webp" class="d-none">

                    <!-- 업로드된 이미지 미리보기 그리드 -->
                    <div id="image-preview-grid" class="gallery-grid mt-3"
                         style="display:none; grid-template-columns:repeat(4,1fr); gap:0.5rem;">
                      <!-- JS로 미리보기 삽입 -->
                    </div>
                    <div id="image-count" class="small text-muted mt-1"></div>
                  </td>
                </tr>

                <!-- 추가 첨부파일 (언론보도용 — 원본 기사 PDF 등) -->
                <tr>
                  <th style="vertical-align:top; padding-top:1rem;">
                    첨부파일
                    <div class="small fw-normal text-muted mt-1">선택 사항</div>
                  </th>
                  <td>
                    <div class="file-upload-area"
                         onclick="document.getElementById('attach-input').click()">
                      <i class="fa-solid fa-paperclip"></i>
                      <p class="mt-2 mb-1">PDF, 문서 파일 등 추가 첨부</p>
                      <p class="small text-muted">PDF, DOC, HWP (최대 20MB)</p>
                    </div>
                    <input type="file" id="attach-input" name="attachments" multiple
                           accept=".pdf,.doc,.docx,.hwp,.hwpx" class="d-none">
                    <div id="attach-list" class="small text-muted mt-1"></div>
                  </td>
                </tr>

              </tbody>
            </table>

            <!-- 버튼 -->
            <div class="d-flex justify-content-between align-items-center">
              <a href="board/album-list.html" class="btn btn-outline-secondary px-4">
                <i class="fa-solid fa-list me-1"></i>목록
              </a>
              <div class="d-flex gap-2">
                <button type="reset" class="btn btn-outline-secondary px-4">
                  <i class="fa-solid fa-rotate-left me-1"></i>초기화
                </button>
                <button type="submit" class="btn btn-gold px-5">
                  <i class="fa-solid fa-check me-1"></i>등록
                </button>
              </div>
            </div>

          </form>

        </section>
      </div>
    </div>

  </main>

  <div data-include="include/footer.html"></div>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/sub.js"></script>
  <script>
    // 이미지 미리보기 (데모용)
    document.getElementById('media-input')?.addEventListener('change', function () {
      const grid = document.getElementById('image-preview-grid');
      const count = document.getElementById('image-count');
      grid.innerHTML = '';
      [...this.files].slice(0, 12).forEach(file => {
        const reader = new FileReader();
        const div = document.createElement('div');
        div.style.cssText = 'aspect-ratio:1;overflow:hidden;border-radius:6px;background:#edeeef;';
        reader.onload = e => {
          div.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
        };
        reader.readAsDataURL(file);
        grid.appendChild(div);
      });
      grid.style.display = 'grid';
      count.textContent = `${this.files.length}장 선택됨`;
    });

    // 첨부파일 목록
    document.getElementById('attach-input')?.addEventListener('change', function () {
      document.getElementById('attach-list').innerHTML =
        [...this.files].map(f =>
          `<div><i class="fa-solid fa-paperclip me-1"></i>${f.name}</div>`
        ).join('');
    });
  </script>
</body>
</html>
