<div class="siiru-boardWrap">

  <!-- 숨김 폼 -->
  <form id="boardSearchForm" name="boardSearchForm" method="post">
    <input type="hidden" name="pageId" value="">
    <input type="hidden" id="movePage" name="movePage" value="1">
    <input type="hidden" id="boardId" name="boardId" value="">
    <input type="hidden" id="searchCtgry" name="searchCtgry" value="">
    <input type="hidden" id="searchCtgryNm" name="searchCtgryNm" value="">
    <input type="hidden" id="searchSDe" name="searchSDe" value="">
    <input type="hidden" id="searchEDe" name="searchEDe" value="">
    <input type="hidden" id="searchTy" name="searchTy" value="">
    <input type="hidden" id="searchQuery" name="searchQuery" value="">
  </form>

  <!-- 게시글 등록 폼 -->
  <form id="boardForm" name="boardForm" method="post" enctype="multipart/form-data">
    <input type="hidden" id="action" name="action" value="insert">
    <input type="hidden" id="seq" name="seq" value="">

    <div class="siiruBoard-write">

      <!-- 분류 (JSP: bare select) -->
      <dl>
        <dt><span>*</span> <label for="ctgrySn">분류</label></dt>
        <dd>
          <select id="ctgrySn" name="ctgrySn" class="small2">
            <option value="">선택하세요</option>
            <option value="1">학술행사</option>
            <option value="2">세미나</option>
            <option value="3">특강</option>
            <option value="4">기타</option>
          </select>
        </dd>
      </dl>

      <!-- 제목 (JSP: bare input) -->
      <dl>
        <dt><span>*</span> <label for="boardSj">제목</label></dt>
        <dd>
          <input type="text" id="boardSj" name="boardSj" maxlength="200" placeholder="제목을 입력하세요">
        </dd>
      </dl>

      <!-- 작성자 (JSP: class="small2") -->
      <dl>
        <dt><span>*</span> <label for="userNm">작성자</label></dt>
        <dd>
          <input type="text" class="small2" id="userNm" name="userNm" maxlength="50" placeholder="작성자명">
        </dd>
      </dl>

      <!-- 설명 (JSP: bare textarea) -->
      <dl>
        <dt><label for="boardCn">설명</label></dt>
        <dd>
          <textarea id="boardCn" name="boardCn" rows="5" placeholder="앨범 설명을 입력하세요. (선택)"></textarea>
        </dd>
      </dl>

      <!-- 대표 이미지 -->
      <dl>
        <dt><label>대표 이미지</label></dt>
        <dd>
          <div class="thumb-preview" onclick="document.getElementById('thumbInput').click()">
            <i class="fa-solid fa-image"></i>
            <span>클릭하여 대표 이미지 선택</span>
            <small>16:9 비율 권장 · JPG, PNG</small>
          </div>
          <input type="file" id="thumbInput" name="thumbFile" class="siiru-hidden" accept="image/*">
        </dd>
      </dl>

      <!-- 사진 업로드 -->
      <dl>
        <dt><span>*</span> <label>사진 업로드</label></dt>
        <dd>
          <div class="file-upload-drop" onclick="document.getElementById('photoInput').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p>사진 파일을 드래그하거나 클릭하여 업로드<br><small>여러 파일 선택 가능 · JPG, PNG, WEBP · 각 최대 10MB</small></p>
          </div>
          <input type="file" id="photoInput" name="photo[]" class="siiru-hidden" accept="image/*" multiple>
          <ul class="file-list" id="photoList"></ul>
        </dd>
      </dl>

    </div>

    <!-- 버튼 -->
    <div class="siiruBoard-btnArea">
      <button type="submit" class="siiru-btn siiru-btn-primary">
        <i class="fa-solid fa-check me-1"></i>등록
      </button>
      <a href="list.html" class="siiru-btn">
        <i class="fa-solid fa-xmark me-1"></i>취소
      </a>
    </div>
  </form>

</div>
