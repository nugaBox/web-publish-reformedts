<div class="siiru-boardWrap">

  <!-- 검색 폼 -->
  <div class="siiruBoard-search">
    <form id="boardSearchForm" name="boardSearchForm" method="post" action="#">
      <input type="hidden" name="pageId" value="">
      <input type="hidden" id="movePage" name="movePage" value="1">
      <input type="hidden" id="searchCtgryNm" name="searchCtgryNm" value="">
      <input type="hidden" id="boardId" name="boardId" value="">
      <!-- dateSearch: CMS 필드 유지, sub.css에서 숨김 처리 -->
      <div class="dateSearch" aria-hidden="true">
        <input type="radio" id="dateSet0" name="searchDateSet" value="0">
        <input type="radio" id="dateSet1" name="searchDateSet" value="6">
        <input type="radio" id="dateSet2" name="searchDateSet" value="30">
        <input type="radio" id="dateSet3" name="searchDateSet" value="90">
        <input type="radio" id="dateSet4" name="searchDateSet" value="180">
        <input type="radio" id="dateSet5" name="searchDateSet" value="365">
        <input type="text" class="maskDate" id="searchSDe" name="searchSDe" maxlength="10" autocomplete="off">
        <input type="text" class="maskDate" id="searchEDe" name="searchEDe" maxlength="10" autocomplete="off">
      </div>
      <div class="siiruBoard-searchRow">
        <select id="searchTy" name="searchTy" class="form-select siiruBoard-searchSelect">
          <option value="1">제목+내용</option>
          <option value="2">제목</option>
          <option value="3">내용</option>
          <option value="4">작성자</option>
        </select>
        <div class="input-group">
          <input type="text" id="searchQuery" name="searchQuery" class="form-control siiruBoard-searchInput" placeholder="검색어를 입력하세요">
          <button type="submit" class="btn siiruBoard-searchBtn">
            <i class="fa-solid fa-magnifying-glass"></i><span class="ms-1">검색</span>
          </button>
        </div>
      </div>
    </form>
  </div>
